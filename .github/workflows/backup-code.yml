name: Nightly Code Backup

on:
  schedule:
    # Every day at 02:30 UTC (30 min after DB backup)
    - cron: '30 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Full checkout (all branches, tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for bundle

      - name: Install AWS CLI
        run: |
          if ! command -v aws &>/dev/null; then
            curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install --update
          fi

      - name: Run code backup
        env:
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          BACKUP_S3_PREFIX: ${{ secrets.BACKUP_S3_PREFIX || 'compplan' }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
          SECONDARY_GIT_REMOTE_URL: ${{ secrets.SECONDARY_GIT_REMOTE_URL }}
        run: |
          chmod +x scripts/backup_code.sh
          bash scripts/backup_code.sh
